name: Sync to Gitee and Deploy Pages

on:
  push:
    branches: [ main ]

jobs:
  sync-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout source code
        uses: actions/checkout@v3
        with:
          fetch-depth: 0

      - name: Push to Gitee
        env:
          GITEE_REPO: ${{ secrets.GITEE_REPO }}
        run: |
          cd $GITHUB_WORKSPACE
          git push --force https://wuwa-ls:$GITEE_REPO@gitee.com/wuwa-ls/wuwa-ls.gitee.io.git main

      - name: Trigger Gitee Pages Update
        uses: yanglbme/gitee-pages-action@main
        with:
          gitee-username: wuwa-ls
          gitee-password: ${{ secrets.GITEE_PASSWORD }}
          gitee-repo: wuwa-ls/wuwa-ls.gitee.io
          branch: main